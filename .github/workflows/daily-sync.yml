name: Daily NBA Sync

on:
  schedule:
    # 05:00 UTC = 06:00 Paris (CET hiver) / 07:00 Paris (CEST été)
    # Les matchs se terminent au plus tard vers 05:30 Paris — cette heure est idéale.
    - cron: "0 5 * * *"
  workflow_dispatch: # déclenchement manuel pour tests

jobs:
  sync:
    name: Sync NBA data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run daily sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: pnpm tsx scripts/sync-daily.ts
